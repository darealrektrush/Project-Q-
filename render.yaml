services:
  - type: web
    name: project-q
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_TOPIC_IDS
        sync: false
      - key: BAGWORK_SECRET
        sync: false
      - key: FAWKQ_WEBSITE_URL
        sync: false
      - key: XP_PER_SOL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: HELIUS_API_KEY
        sync: false
      - key: HELIUS_RPC_URL
        sync: false
      - key: TOKEN_MINT
        sync: false

  - type: cron
    name: project-q-distribute
    runtime: node
    schedule: "0 17 */3 * *"
    buildCommand: npm install
    startCommand: npm run distribute
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_TOPIC_IDS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: HELIUS_API_KEY
        sync: false
      - key: HELIUS_RPC_URL
        sync: false
      - key: TOKEN_MINT
        sync: false
      - key: CREATOR_WALLET_SECRET
        sync: false
      - key: COMMUNITY_WALLET_SECRET
        sync: false
      - key: COMMUNITY_WALLET_PUBLIC
        sync: false
      - key: DEV_WALLET_PUBLIC
        sync: false
      - key: OCEAN_WALLET_PUBLIC
        sync: false
      - key: BAG_WALLET_PUBLIC
        sync: false
      - key: BUYBACK_RESERVE_WALLET_PUBLIC
        sync: false
      - key: DISTRIBUTION_RESERVE_LAMPORTS
        sync: false
